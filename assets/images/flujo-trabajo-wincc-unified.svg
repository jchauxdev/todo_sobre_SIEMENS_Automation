<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="850" viewBox="0 0 800 850" role="img">
<title>Flujo de trabajo típico con WinCC Unified</title>
<desc>Cuatro etapas: Diseño en TIA Portal, Compilación, Despliegue al Runtime y Operación en navegador web.</desc>

<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<style>
.title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 22px; font-weight: 600; fill: #1a1a1a; }
.subtitle { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; fill: #666; }
.stage-num { font-family: 'Segoe UI', Arial, sans-serif; font-size: 18px; font-weight: 700; }
.stage-title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 17px; font-weight: 600; }
.stage-tool { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; font-style: italic; }
.stage-desc { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; }
.footer { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #999; }
</style>
</defs>

<!-- Fondo blanco -->
<rect width="800" height="850" fill="#ffffff"/>

<!-- Título principal -->
<text x="400" y="45" text-anchor="middle" class="title">Flujo de trabajo típico con WinCC Unified</text>
<text x="400" y="68" text-anchor="middle" class="subtitle">Desarrollo de SCADA basado en web · SENA · Automatización Industrial</text>

<!-- Línea decorativa -->
<line x1="100" y1="85" x2="700" y2="85" stroke="#e0e0e0" stroke-width="1"/>

<!-- ============ ETAPA 1: DISEÑO ============ -->
<g>
<rect x="60" y="115" width="680" height="135" rx="12" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.8"/>
<circle cx="105" cy="160" r="22" fill="#7F77DD" opacity="0.3"/>
<text x="105" y="167" text-anchor="middle" class="stage-num" fill="#3C3489">1</text>
<text x="150" y="155" class="stage-title" fill="#3C3489">Diseño</text>
<text x="150" y="175" class="stage-tool" fill="#534AB7">TIA Portal V21 + WinCC Unified Engineering</text>
<line x1="150" y1="190" x2="720" y2="190" stroke="#7F77DD" stroke-width="0.5" opacity="0.4"/>
<text x="150" y="212" class="stage-desc" fill="#3C3489">• Crear proyecto y agregar dispositivos: PLC, HMIs, PC station</text>
<text x="150" y="230" class="stage-desc" fill="#3C3489">• Configurar pantallas, tags HMI, alarmas, recetas, usuarios</text>
</g>

<!-- Flecha 1→2 -->
<line x1="400" y1="250" x2="400" y2="285" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>

<!-- ============ ETAPA 2: COMPILACIÓN ============ -->
<g>
<rect x="60" y="290" width="680" height="135" rx="12" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.8"/>
<circle cx="105" cy="335" r="22" fill="#1D9E75" opacity="0.3"/>
<text x="105" y="342" text-anchor="middle" class="stage-num" fill="#085041">2</text>
<text x="150" y="330" class="stage-title" fill="#085041">Compilación</text>
<text x="150" y="350" class="stage-tool" fill="#0F6E56">Click derecho PC-System → Compile → Software (all)</text>
<line x1="150" y1="365" x2="720" y2="365" stroke="#1D9E75" stroke-width="0.5" opacity="0.4"/>
<text x="150" y="387" class="stage-desc" fill="#085041">• Verificar contraseña de administrador y pantalla de inicio</text>
<text x="150" y="405" class="stage-desc" fill="#085041">• Resultado esperado: errors 0 / warnings 0</text>
</g>

<!-- Flecha 2→3 -->
<line x1="400" y1="425" x2="400" y2="460" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>

<!-- ============ ETAPA 3: DESPLIEGUE ============ -->
<g>
<rect x="60" y="465" width="680" height="135" rx="12" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.8"/>
<circle cx="105" cy="510" r="22" fill="#EF9F27" opacity="0.3"/>
<text x="105" y="517" text-anchor="middle" class="stage-num" fill="#633806">3</text>
<text x="150" y="505" class="stage-title" fill="#633806">Despliegue</text>
<text x="150" y="525" class="stage-tool" fill="#854F0B">Download to device → Software (all)</text>
<line x1="150" y1="540" x2="720" y2="540" stroke="#EF9F27" stroke-width="0.5" opacity="0.4"/>
<text x="150" y="562" class="stage-desc" fill="#633806">• Destino: WinCC Unified PC Runtime local</text>
<text x="150" y="580" class="stage-desc" fill="#633806">• PG/PC interface: tarjeta de red real del PC (no PLCSIM Virtual)</text>
</g>

<!-- Flecha 3→4 -->
<line x1="400" y1="600" x2="400" y2="635" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>

<!-- ============ ETAPA 4: OPERACIÓN ============ -->
<g>
<rect x="60" y="640" width="680" height="135" rx="12" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.8"/>
<circle cx="105" cy="685" r="22" fill="#378ADD" opacity="0.3"/>
<text x="105" y="692" text-anchor="middle" class="stage-num" fill="#0C447C">4</text>
<text x="150" y="680" class="stage-title" fill="#0C447C">Operación</text>
<text x="150" y="700" class="stage-tool" fill="#185FA5">Acceso web desde cualquier navegador (Edge, Chrome, Firefox)</text>
<line x1="150" y1="715" x2="720" y2="715" stroke="#378ADD" stroke-width="0.5" opacity="0.4"/>
<text x="150" y="737" class="stage-desc" fill="#0C447C">• URL: https://localhost (local) o IP del servidor (red)</text>
<text x="150" y="755" class="stage-desc" fill="#0C447C">• Login: administrator + contraseña configurada en Runtime Settings</text>
</g>

<!-- Pie de página -->
<text x="400" y="815" text-anchor="middle" class="footer">SENA · Formación Profesional · Automatización Industrial con Siemens</text>
<text x="400" y="832" text-anchor="middle" class="footer" font-style="italic">WinCC Unified Workflow · Mayo 2026</text>
</svg>
